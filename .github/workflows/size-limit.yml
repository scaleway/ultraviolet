name: 'size'
on:
  pull_request:

jobs:
  size:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6.0.3
      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
      - run: pnpm install
      - run: pnpm run size
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
